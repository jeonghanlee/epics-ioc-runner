name: EPICS IOC Runner CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  integration-test:
    name: ${{ matrix.os }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: "Rocky Linux 8.10"
            image: "jeonghanlee/rocky8-epics:latest"
            use_pkg_auto: false
          - os: "Rocky Linux 10"
            image: "jeonghanlee/rocky10-epics:latest"
            use_pkg_auto: false
          - os: "Debian 13"
            image: "jeonghanlee/debian13-epics:latest"
            use_pkg_auto: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Optimization: Reclaim disk space for heavy container images
      - name: Cleanup runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc

      - name: Execute Tests in Docker
        uses: addnab/docker-run-action@v3
        with:
          image: ${{ matrix.image }}
          # --privileged is mandatory for UDS and systemd shimming
          options: --privileged -e TERM=xterm -v ${{ github.workspace }}:/workspace -w /workspace
          run: |
            # 1. Initialize EPICS Environment
            [ -f "/usr/local/setEnv" ] && source /usr/local/setEnv

            # 2. Fix Sudo & PAM for Docker environment (Non-interactive session)
            echo "root ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/nopasswd
            sed -i 's/required/optional/g' /etc/pam.d/common-session || true

            # 3. Install Systemctl Shim (Handle 'Host is down' / PID 1 issues)
            if ! command -v systemctl >/dev/null 2>&1 || [ ! -L /bin/systemctl ]; then
              if [ -f /etc/debian_version ]; then
                apt-get update && apt-get install -y python3 curl
              else
                dnf install -y python3 curl
              fi
              curl -sSL https://raw.githubusercontent.com/gdraheim/docker-systemctl-replacement/master/files/docker/systemctl3.py -o /usr/local/bin/systemctl
              chmod +x /usr/local/bin/systemctl
            fi

            # 4. OS-Specific Dependency & procServ-env Installation
            if [ -f /etc/debian_version ]; then
              apt-get update && apt-get install -y git build-essential procserv telnet libreadline-dev
            elif [ -f /etc/redhat-release ]; then
              dnf groupinstall -y "Development Tools"
              dnf install -y git telnet readline-devel

              # Build and Install procServ from specific environment package as requested
              echo "Installing procServ via procServ-env for Rocky Linux..."
              git clone --depth 1 https://github.com/jeonghanlee/procServ-env /tmp/procserv_build
              cd /tmp/procserv_build && make && make install
              cd /workspace
            fi

            # 5. Build and Install 'con' tool (Mandatory for attachment tests)
            git clone --depth 1 https://github.com/jeonghanlee/con /tmp/con_build
            cd /tmp/con_build && make -j$(nproc) && make install DESTDIR=/usr/local
            cd /workspace

            # 6. Execute Infrastructure & Test Suite
            # Export BASH_ENV to ensure all subshells inherit EPICS settings
            export BASH_ENV=/usr/local/setEnv

            echo "--- Phase 3: Infrastructure Setup ---"
            bash bin/setup-system-infra.bash

            echo "--- Phase 4: Integration Testing ---"
            bash tests/run-all-tests.bash

