name: EPICS IOC Runner CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  integration-test:
    name: ${{ matrix.os }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: "Rocky Linux 8.10"
            image: "jeonghanlee/rocky8-epics:latest"
            use_pkg_auto: false
          - os: "Rocky Linux 10"
            image: "jeonghanlee/rocky10-epics:latest"
            use_pkg_auto: false
          - os: "Debian 13"
            image: "jeonghanlee/debian13-epics:latest"
            use_pkg_auto: false
          - os: "Ubuntu 24.04"
            image: "ubuntu:latest"
            use_pkg_auto: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Optimization: Reclaim disk space for heavy container images
      - name: Cleanup runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc

      - name: Execute Tests in Docker
        uses: addnab/docker-run-action@v3
        with:
          image: ${{ matrix.image }}
          # Ensure we are working from the repository root
          options: --privileged -e TERM=xterm -w /github/workspace
          run: |
            # 1. Install system dependencies for 'con' build and testing
            if [ -f /etc/debian_version ]; then
              apt-get update && apt-get install -y git build-essential procserv sudo telnet libreadline-dev
            elif [ -f /etc/redhat-release ]; then
              dnf groupinstall -y "Development Tools"
              dnf install -y git procServ sudo telnet readline-devel
            fi

            # 2. Build and Install 'con' (Console tool)
            # Compilation must happen before running tests that depend on 'con'
            git clone --depth 1 https://github.com/jeonghanlee/con /tmp/con_build
            cd /tmp/con_build
            make -j$(nproc)
            # Verify if binaries are created before installation to avoid 'No such file' errors
            if [ -f "con" ] && [ -f "send_rs232" ]; then
              make install DESTDIR=/usr/local
            else
              echo "Error: 'con' or 'send_rs232' build failed." >&2
              exit 1
            fi

            # 3. Return to root and execute scripts using corrected paths
            cd /github/workspace

            # Setup infrastructure (Located in bin/ as pointed out)
            if [ -f "bin/setup-system-infra.bash" ]; then
              bash bin/setup-system-infra.bash
            else
              echo "Error: bin/setup-system-infra.bash not found. Check repository structure." >&2
              ls -R bin/
              exit 1
            fi

            # Run all tests
            if [ -f "tests/run-all-tests.bash" ]; then
              bash tests/run-all-tests.bash
            else
              echo "Error: tests/run-all-tests.bash not found." >&2
              ls -R tests/
              exit 1
            fi
