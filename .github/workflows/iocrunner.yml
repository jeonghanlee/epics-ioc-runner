name: EPICS IOC Runner CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  integration-test:
    name: ${{ matrix.os }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: "Rocky Linux 8.10"
            image: "jeonghanlee/rocky8-epics:latest"
            use_pkg_auto: false
          - os: "Rocky Linux 10"
            image: "jeonghanlee/rocky10-epics:latest"
            use_pkg_auto: false
          - os: "Debian 13"
            image: "jeonghanlee/debian13-epics:latest"
            use_pkg_auto: false
          - os: "Ubuntu 24.04"
            image: "ubuntu:latest"
            use_pkg_auto: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Optimization: Reclaim disk space for heavy container images
      - name: Cleanup runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc

      - name: Execute Tests in Docker
        uses: addnab/docker-run-action@v3
        with:
          image: ${{ matrix.image }}
          options: --privileged -e TERM=xterm -v ${{ github.workspace }}:/workspace -w /workspace
          run: |
            # 1. Initialize EPICS Environment (Essential)
            [ -f "/usr/local/setEnv" ] && source /usr/local/setEnv

            # 2. Fix Sudo & PAM (Crucial for infrastructure tests)
            # Disable password requirement and bypass PAM session issues in Docker
            echo "root ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/nopasswd
            sed -i 's/required/optional/g' /etc/pam.d/common-session || true

            # 3. Systemctl Shim (Lightweight alternative to PID 1)
            # This allows systemctl commands to 'succeed' by mocking the state
            if ! command -v systemctl >/dev/null 2>&1 || [ ! -L /bin/systemctl ]; then
              echo "Installing systemctl shim..."
              if [ -f /etc/debian_version ]; then
                apt-get update && apt-get install -y python3 curl
              else
                dnf install -y python3 curl
              fi
              curl -sSL https://raw.githubusercontent.com/gdraheim/docker-systemctl-replacement/master/files/docker/systemctl3.py -o /usr/local/bin/systemctl
              chmod +x /usr/local/bin/systemctl
            fi

            # 4. Build and Install 'con' (Mandatory for Phase 2/4)
            git clone --depth 1 https://github.com/jeonghanlee/con /tmp/con_build
            cd /tmp/con_build && make -j$(nproc) && make install DESTDIR=/usr/local
            cd /workspace

            # 5. Execute Scripts with Verified Paths
            # Sourcing again to ensure environment is inherited in sub-shells
            export BASH_ENV=/usr/local/setEnv

            echo "--- Phase 3: Infrastructure Setup ---"
            if [ -f "bin/setup-system-infra.bash" ]; then
              # Running setup-system-infra.bash to create ioc-srv user and dirs
              bash bin/setup-system-infra.bash
            else
              echo "Error: bin/setup-system-infra.bash not found!"; exit 1
            fi

            echo "--- Phase 4: Integration Testing ---"
            if [ -f "tests/run-all-tests.bash" ]; then
              bash tests/run-all-tests.bash
            else
              echo "Error: tests/run-all-tests.bash not found!"; exit 1
            fi
