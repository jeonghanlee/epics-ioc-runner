name: EPICS IOC Runner CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  integration-test:
    name: ${{ matrix.os }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: "Rocky Linux 8.10"
            image: "jeonghanlee/rocky8-epics:latest"
            use_pkg_auto: false
          - os: "Rocky Linux 10"
            image: "jeonghanlee/rocky10-epics:latest"
            use_pkg_auto: false
          - os: "Debian 13"
            image: "jeonghanlee/debian13-epics:latest"
            use_pkg_auto: false
          - os: "Ubuntu 24.04"
            image: "ubuntu:latest"
            use_pkg_auto: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Optimization: Reclaim disk space for heavy container images
      - name: Cleanup runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc

      - name: Execute Tests in Docker
        uses: addnab/docker-run-action@v3
        with:
          image: ${{ matrix.image }}
          # Use --privileged and share the full workspace
          options: --privileged -e TERM=xterm -v ${{ github.workspace }}:/workspace -w /workspace
          run: |
            # 1. Install critical build dependencies
            echo "Installing system dependencies..."
            if [ -f /etc/debian_version ]; then
              apt-get update && apt-get install -y git build-essential procserv sudo telnet libreadline-dev
            elif [ -f /etc/redhat-release ]; then
              dnf groupinstall -y "Development Tools"
              dnf install -y git procServ sudo telnet readline-devel
            fi

            # 2. Build and Install 'con' (Console tool)
            echo "Building 'con' from source..."
            git clone --depth 1 https://github.com/jeonghanlee/con /tmp/con_build
            cd /tmp/con_build
            make -j$(nproc)

            # Verify build success before install
            if [ -f "con" ] && [ -f "send_rs232" ]; then
              make install DESTDIR=/usr/local
            else
              echo "Error: 'con' build failed. Check compiler output above." >&2
              exit 1
            fi

            # 3. Locate and Execute IOC Runner scripts
            cd /workspace
            echo "Current directory: $(pwd)"

            # Find the absolute path of the scripts regardless of their location
            SETUP_SCRIPT=$(find . -name "setup-system-infra.bash" | head -n 1)
            TEST_SCRIPT=$(find . -name "run-all-tests.bash" | head -n 1)

            if [ -n "${SETUP_SCRIPT}" ]; then
              echo "Executing: ${SETUP_SCRIPT}"
              bash "${SETUP_SCRIPT}"
            else
              echo "Error: setup-system-infra.bash not found in /workspace" >&2
              ls -R
              exit 1
            fi

            if [ -n "${TEST_SCRIPT}" ]; then
              echo "Executing: ${TEST_SCRIPT}"
              bash "${TEST_SCRIPT}"
            else
              echo "Error: run-all-tests.bash not found!" >&2
              exit 1
            fi
