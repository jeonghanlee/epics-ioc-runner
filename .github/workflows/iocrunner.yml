name: EPICS IOC Runner CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  integration-test:
    name: ${{ matrix.os }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: "Rocky Linux 8.10"
            image: "jeonghanlee/rocky8-epics:latest"
            use_pkg_auto: false
          - os: "Rocky Linux 10"
            image: "jeonghanlee/rocky10-epics:latest"
            use_pkg_auto: false
          - os: "Debian 13"
            image: "jeonghanlee/debian13-epics:latest"
            use_pkg_auto: false
          - os: "Ubuntu 24.04"
            image: "ubuntu:latest"
            use_pkg_auto: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Optimization: Reclaim disk space for heavy container images
      - name: Cleanup runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc

      - name: Run tests in container
        uses: addnab/docker-run-action@v3
        with:
          image: ${{ matrix.image }}
          # Privileged mode is required for systemd and UDS testing
          options: --privileged -e TERM=xterm
          run: |
            # 1. Install minimal system dependencies
            if [ -f /etc/debian_version ]; then
              apt-get update && apt-get install -y git build-essential procserv sudo telnet libreadline-dev
            elif [ -f /etc/redhat-release ]; then
              dnf groupinstall -y "Development Tools"
              dnf install -y git procServ sudo telnet readline-devel
            fi

            # 2. Provisioning via pkg_automation for Vanilla OS (Ubuntu)
            if [ "${{ matrix.use_pkg_auto }}" = "true" ]; then
              git clone --depth 1 https://github.com/jeonghanlee/pkg_automation /tmp/pkg_auto
              bash /tmp/pkg_auto/pkg_automation.bash --yes
            fi

            # 3. Build and Install 'con' (Console tool)
            # This tool is essential for attaching to procServ via UNIX domain sockets
            echo "Installing 'con' from source..."
            git clone --depth 1 https://github.com/jeonghanlee/con /tmp/con_build
            cd /tmp/con_build
            make -j$(nproc)
            make install DESTDIR=/usr/local
            cd - && rm -rf /tmp/con_build

            # 4. Infrastructure Setup and Full Test Execution
            # Verify system-wide configuration and lifecycle (Phases 1-4)
            bash setup-system-infra.bash
            bash tests/run-all-tests.bash
